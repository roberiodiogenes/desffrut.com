<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Desffrut Hardware</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 300px; min-height: 200px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 13px; color: #1a2332; background: #f8fafc;
  }

  .header {
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    color: #fff; padding: 16px 18px;
    display: flex; align-items: center; gap: 10px;
  }
  .header .logo { font-size: 1.5rem; }
  .header h1 { font-size: 1rem; font-weight: 700; }
  .header small { font-size: .72rem; opacity: .85; }

  .body { padding: 14px 16px; }

  .status-row {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; border-radius: 10px;
    background: #fff; border: 1px solid #e8ecf2;
    margin-bottom: 10px;
  }
  .dot {
    width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
  }
  .dot.ok   { background: #22c55e; box-shadow: 0 0 0 3px rgba(34,197,94,.2); }
  .dot.err  { background: #ef4444; box-shadow: 0 0 0 3px rgba(239,68,68,.2); }
  .dot.spin { background: #94a3b8; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100% { opacity:.4 } 50% { opacity:1 } }

  .status-label strong { display: block; font-size: .82rem; font-weight: 600; }
  .status-label span   { font-size: .72rem; color: #64748b; }

  .printers-section { margin-top: 14px; }
  .printers-title {
    font-size: .72rem; font-weight: 700; color: #64748b;
    text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px;
  }
  .printer-item {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 10px; background: #fff; border: 1px solid #e8ecf2;
    border-radius: 8px; margin-bottom: 6px;
    font-size: .8rem;
  }
  .printer-item .tipo-badge {
    padding: 2px 8px; border-radius: 12px; font-size: .7rem; font-weight: 600;
  }
  .tipo-badge.cupom    { background: #eff6ff; color: #1d4ed8; }
  .tipo-badge.etiqueta { background: #f0fdf4; color: #15803d; }
  .tipo-badge.inkjet   { background: #faf5ff; color: #7c3aed; }

  .footer {
    border-top: 1px solid #e8ecf2; padding: 10px 16px;
    display: flex; gap: 8px;
  }
  .btn {
    flex: 1; padding: 7px; border-radius: 8px; border: none;
    font-size: .78rem; font-weight: 600; cursor: pointer; transition: opacity .15s;
  }
  .btn:hover { opacity: .85; }
  .btn-primary { background: #6366f1; color: #fff; }
  .btn-outline { background: #fff; color: #64748b; border: 1px solid #e2e8f0; }

  .version { font-size: .65rem; color: #94a3b8; text-align: center; padding: 6px 0 8px; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">🖨️</div>
  <div>
    <h1>Desffrut Hardware</h1>
    <small>Native Messaging Bridge v2.0</small>
  </div>
</div>

<div class="body">

  <!-- Status do host -->
  <div class="status-row">
    <div class="dot spin" id="dot-host"></div>
    <div class="status-label">
      <strong id="lbl-host">Verificando host…</strong>
      <span id="sub-host">Conectando ao host nativo</span>
    </div>
  </div>

  <!-- Impressoras configuradas -->
  <div class="printers-section" id="printers-section" style="display:none">
    <div class="printers-title">Impressoras configuradas nesta estação</div>
    <div id="printers-list"></div>
  </div>

  <!-- Nenhuma config -->
  <div id="no-config" style="display:none;text-align:center;padding:12px 0;color:#94a3b8;font-size:.8rem">
    Nenhuma impressora configurada.<br>
    Acesse Dashboard → Hardware para configurar.
  </div>

</div>

<div class="footer">
  <button class="btn btn-primary" id="btn-abrir" onclick="abrirDashboard()">
    Abrir Dashboard
  </button>
  <button class="btn btn-outline" onclick="verificarHost()">
    ↺ Verificar
  </button>
</div>

<div class="version">Desffrut Hardware Extension v2.0.0</div>

<script src="popup.js"></script>
</body>
</html>
